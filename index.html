<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Water Shooting Fun Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Prevent scrolling on mobile */
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #38bdf8;
        }

        /* Target Animations */
        .target-item {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            transform-origin: bottom center;
        }
        .target-item.hit {
            transform: rotateX(80deg) translateY(-20px) scale(0.8) !important;
            opacity: 0;
            pointer-events: none;
        }

        /* Floating Score Animation */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }
        .animate-float-up {
            animation: floatUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Water Pool Reflection Animation */
        @keyframes wave {
            0% { transform: translateX(-10%); }
            50% { transform: translateX(-20%); }
            100% { transform: translateX(-10%); }
        }
        .animate-wave { animation: wave 6s ease-in-out infinite; }
        .animate-wave-slow { animation: wave 10s ease-in-out infinite reverse; }
        
        /* Bunting Flags Animation */
        @keyframes flutter {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(2px) rotate(2deg); }
        }
        .flutter { animation: flutter 3s ease-in-out infinite; }
    </style>
</head>
<body class="relative w-full h-screen bg-gradient-to-b from-sky-300 to-sky-100 overflow-hidden">

    <!-- Scenery: Background Elements -->
    <div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
        <!-- Sun -->
        <div class="absolute top-10 right-20 w-32 h-32 bg-yellow-200 rounded-full blur-xl opacity-70"></div>
        
        <!-- Bunting / Flags String -->
        <svg class="absolute top-12 w-full h-24" preserveAspectRatio="none">
            <path d="M -10 20 Q 50% 100 110% 20" fill="none" stroke="#8B5A2B" stroke-width="2" opacity="0.6"/>
        </svg>
        <div class="absolute top-12 w-full flex justify-around px-10 flutter opacity-90">
            <div class="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[40px] border-t-red-500 mt-2"></div>
            <div class="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[40px] border-t-blue-500 mt-8"></div>
            <div class="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[40px] border-t-yellow-400 mt-12"></div>
            <div class="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[40px] border-t-green-500 mt-8"></div>
            <div class="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[40px] border-t-orange-500 mt-2"></div>
        </div>

        <!-- Tropical Elements -->
        <div class="absolute bottom-[30vh] w-full flex justify-between px-4 sm:px-16 items-end opacity-90">
            <div class="text-7xl sm:text-8xl transform scale-x-[-1] drop-shadow-lg">🌴</div>
            <div class="text-6xl sm:text-7xl mb-4 drop-shadow-xl">🛖</div>
            <div class="text-7xl sm:text-8xl drop-shadow-lg">🌴</div>
        </div>
    </div>

    <!-- Scenery: Water Pool Foreground -->
    <div class="absolute bottom-0 w-full h-[35vh] bg-gradient-to-b from-cyan-400 via-cyan-500 to-blue-700 border-t-4 border-cyan-200 shadow-[inset_0_20px_40px_rgba(255,255,255,0.4)] z-0 overflow-hidden">
        <div class="w-[200%] h-6 bg-white opacity-20 mt-4 animate-wave rounded-full blur-md"></div>
        <div class="w-[150%] h-4 bg-white opacity-10 mt-8 animate-wave-slow rounded-full blur-sm ml-[-20%]"></div>
        <div class="w-[180%] h-3 bg-white opacity-15 mt-12 animate-wave rounded-full blur-sm ml-[-10%]"></div>
    </div>

    <!-- Wooden Platform for Cannon -->
    <div class="absolute bottom-0 w-full h-16 bg-amber-900 border-t-8 border-amber-700 z-10 shadow-[0_-5px_25px_rgba(0,0,0,0.6)] flex justify-center overflow-hidden">
        <div class="w-full h-full opacity-30 flex gap-4">
            <div class="w-1/5 h-full border-r-2 border-black"></div>
            <div class="w-1/5 h-full border-r-2 border-black"></div>
            <div class="w-1/5 h-full border-r-2 border-black"></div>
            <div class="w-1/5 h-full border-r-2 border-black"></div>
        </div>
    </div>

    <!-- Gameplay Area: Shelves and Targets -->
    <div id="shelves" class="absolute top-[16vh] w-full h-[52vh] flex flex-col justify-between items-center z-20 pointer-events-none">
        <!-- Generated dynamically via JS -->
    </div>

    <!-- Overlay Canvas for Water Stream & Splash Particles -->
    <canvas id="waterCanvas" class="absolute inset-0 z-30 pointer-events-none"></canvas>

    <!-- Cannon Graphics -->
    <div id="cannon-wrapper" class="absolute bottom-[-10px] left-1/2 w-32 sm:w-48 h-48 sm:h-64 -translate-x-1/2 origin-[50%_100%] z-40 pointer-events-none drop-shadow-2xl">
        <svg viewBox="0 0 100 150" class="w-full h-full">
            <!-- Back handle -->
            <path d="M 25 150 L 35 110 L 65 110 L 75 150 Z" fill="#C2410C"/>
            <!-- Main orange barrel base -->
            <path d="M 15 110 L 25 50 L 75 50 L 85 110 Z" fill="#EA580C"/>
            <!-- Blue middle block -->
            <rect x="30" y="30" width="40" height="40" rx="5" fill="#2563EB"/>
            <!-- Cyan ribbed sections -->
            <rect x="25" y="60" width="50" height="8" fill="#38BDF8"/>
            <rect x="27" y="75" width="46" height="8" fill="#38BDF8"/>
            <rect x="29" y="90" width="42" height="8" fill="#38BDF8"/>
            <!-- Barrel tip -->
            <path d="M 35 30 L 42 0 L 58 0 L 65 30 Z" fill="#0284C7"/>
            <!-- Cannon core hole -->
            <ellipse cx="50" cy="5" rx="10" ry="4" fill="#0F172A"/>
            <!-- Details / Highlights -->
            <path d="M 42 0 L 46 30" stroke="#7DD3FC" stroke-width="2" fill="none"/>
            <circle cx="50" cy="115" r="12" fill="#1E3A8A"/>
            <circle cx="50" cy="115" r="6" fill="#60A5FA"/>
        </svg>
    </div>

    <!-- Visual Crosshair -->
    <div id="crosshair" class="fixed w-12 h-12 pointer-events-none z-50 transform -translate-x-1/2 -translate-y-1/2 transition-transform duration-100 ease-out hidden sm:block drop-shadow-md">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.9)" stroke-width="5" fill="none" stroke-dasharray="12 12"/>
            <circle cx="50" cy="50" r="4" fill="#EF4444"/>
            <line x1="50" y1="0" x2="50" y2="25" stroke="rgba(255,255,255,0.9)" stroke-width="5" stroke-linecap="round"/>
            <line x1="50" y1="100" x2="50" y2="75" stroke="rgba(255,255,255,0.9)" stroke-width="5" stroke-linecap="round"/>
            <line x1="0" y1="50" x2="25" y2="50" stroke="rgba(255,255,255,0.9)" stroke-width="5" stroke-linecap="round"/>
            <line x1="100" y1="50" x2="75" y2="50" stroke="rgba(255,255,255,0.9)" stroke-width="5" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- UI: Top Bar -->
    <div class="absolute top-3 left-0 w-full px-2 sm:px-6 flex justify-between items-center text-white font-black font-sans text-sm sm:text-xl z-50 pointer-events-none">
        
        <!-- Level -->
        <div class="bg-blue-600/90 px-3 py-1 sm:px-5 sm:py-2 rounded-full border-2 border-blue-300 shadow-[0_0_15px_rgba(59,130,246,0.6)] drop-shadow-lg pointer-events-auto">
            <span id="levelDisplay">LEVEL 01</span>
        </div>
        
        <!-- Score -->
        <div class="bg-slate-900/80 px-4 py-1 sm:px-8 sm:py-2 rounded-full border-2 border-slate-500 shadow-lg pointer-events-auto">
            SCORE <span id="scoreDisplay" class="text-sky-300 ml-1 sm:ml-2">0</span>
        </div>
        
        <!-- Coins -->
        <div class="bg-yellow-500/90 px-3 py-1 sm:px-5 sm:py-2 rounded-full border-2 border-yellow-200 text-yellow-950 flex items-center gap-1 sm:gap-2 shadow-[0_0_15px_rgba(234,179,8,0.6)] pointer-events-auto">
            <div class="w-4 h-4 sm:w-6 sm:h-6 bg-yellow-300 rounded-full border-2 border-yellow-700 shadow-inner"></div>
            <span id="coinsDisplay">0</span>
        </div>
        
        <!-- Pause Button -->
        <button id="pauseBtn" class="bg-blue-500 hover:bg-blue-400 active:bg-blue-600 w-10 h-10 sm:w-14 sm:h-14 rounded-full flex justify-center items-center border-2 border-blue-200 shadow-lg pointer-events-auto transition-transform active:scale-95">
            <svg class="w-4 h-4 sm:w-6 sm:h-6 fill-white" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
    </div>

    <!-- Mobile Controls: Enlarge Shoot Button -->
    <button id="mobileShootBtn" class="fixed bottom-6 right-6 w-24 h-24 bg-blue-500/90 rounded-full border-4 border-blue-200 shadow-[0_10px_25px_rgba(0,0,0,0.5)] md:hidden z-50 active:bg-blue-600 flex flex-col items-center justify-center text-white font-black text-lg select-none touch-manipulation">
        <svg class="w-8 h-8 mb-1 fill-white" viewBox="0 0 24 24">
            <path d="M12 2c0 0-4.5 6.5-4.5 10.5 0 2.5 2 4.5 4.5 4.5s4.5-2 4.5-4.5C16.5 8.5 12 2 12 2zm0 13c-1.4 0-2.5-1.1-2.5-2.5 0-1.7 2.5-4.8 2.5-4.8s2.5 3.1 2.5 4.8c0 1.4-1.1 2.5-2.5 2.5z"/>
        </svg>
        SHOOT
    </button>

    <!-- Pause / Restart Menu -->
    <div id="pauseMenu" class="fixed inset-0 bg-black/70 z-[100] hidden flex-col items-center justify-center backdrop-blur-sm">
        <div class="bg-sky-50 p-8 rounded-[2rem] border-4 border-blue-400 shadow-2xl text-center max-w-sm w-[90%]">
            <h2 class="text-4xl sm:text-5xl font-black text-blue-600 mb-6 drop-shadow-md tracking-wider">PAUSED</h2>
            <button id="resumeBtn" class="w-full bg-green-500 hover:bg-green-400 text-white font-bold text-2xl py-4 rounded-2xl mb-4 border-b-4 border-green-700 active:border-b-0 active:translate-y-1 transition-all shadow-md">RESUME</button>
            <button id="restartBtn" class="w-full bg-red-500 hover:bg-red-400 text-white font-bold text-2xl py-4 rounded-2xl border-b-4 border-red-700 active:border-b-0 active:translate-y-1 transition-all shadow-md">RESTART</button>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Game State
        let level = 1;
        let score = 0;
        let coins = 0;
        
        let aimX = window.innerWidth / 2;
        let aimY = window.innerHeight / 2;
        let isShooting = false;
        let cannonAngle = -Math.PI / 2;
        let isPaused = false;
        
        let lastHitTime = 0;
        let particles = [];

        // Canvas Setup
        const canvas = document.getElementById('waterCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            width = canvas.width;
            height = canvas.height;
            aimX = width / 2;
            aimY = height / 2;
            updateCannonAngle();
            updateCrosshair();
        }
        window.addEventListener('resize', resize);
        resize();

        // Audio Context (Initialized on first interaction to comply with browser policies)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playHitSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Layout Configuration (Rows top to bottom)
        const layoutConfig = [
            ['duck', 'target', 'red', 'blue', 'green'],
            ['green', 'blue', 'red', 'target'],
            ['target', 'blue', 'duck', 'green', 'blue', 'yellow']
        ];
        
        const scoreValues = { 'duck': 15, 'target': 20, 'red': 10, 'blue': 10, 'green': 10, 'yellow': 10 };

        // Asset Generation (Inline SVGs)
        function getSVG(type) {
            if (type === 'duck') {
                return `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-xl"><ellipse cx="50" cy="70" rx="35" ry="22" fill="#FACC15"/><circle cx="70" cy="40" r="22" fill="#FACC15"/><circle cx="78" cy="35" r="4" fill="#000"/><path d="M 88 42 Q 105 42 98 52 Q 88 55 85 45 Z" fill="#F97316"/><path d="M 30 65 Q 15 60 10 70 Q 25 75 30 65" fill="#EAB308"/></svg>`;
            } else if (type === 'target') {
                return `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-xl"><circle cx="50" cy="50" r="45" fill="#F8FAFC" stroke="#1E293B" stroke-width="4"/><circle cx="50" cy="50" r="32" fill="#EF4444"/><circle cx="50" cy="50" r="18" fill="#F8FAFC"/><circle cx="50" cy="50" r="8" fill="#EF4444"/></svg>`;
            } else {
                let color;
                if(type === 'red') color = '#EF4444';
                if(type === 'blue') color = '#3B82F6';
                if(type === 'green') color = '#10B981';
                if(type === 'yellow') color = '#F59E0B';
                
                return `<svg viewBox="0 0 50 120" class="w-full h-full drop-shadow-xl">
                    <path d="M 15 40 C 15 25 20 20 20 15 L 20 10 L 30 10 L 30 15 C 30 20 35 25 35 40 L 40 110 C 40 115 35 118 25 118 C 15 118 10 115 10 110 Z" fill="${color}"/>
                    <rect x="18" y="5" width="14" height="6" rx="2" fill="#9CA3AF"/>
                    <path d="M 14 45 Q 18 80 14 105" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.4"/>
                    <ellipse cx="25" cy="65" rx="10" ry="10" fill="#ffffff" opacity="0.2"/>
                </svg>`;
            }
        }

        // Initialize Level
        function initLevel() {
            const container = document.getElementById('shelves');
            container.innerHTML = '';
            
            layoutConfig.forEach((row, index) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'w-full max-w-2xl sm:max-w-4xl mx-auto flex flex-col items-center justify-end relative';
                
                const itemsDiv = document.createElement('div');
                // Use percentage widths to prevent overlap on narrow screens
                itemsDiv.className = 'target-row-items flex justify-around items-end w-[95%] sm:w-full z-10';
                
                row.forEach(item => {
                    const el = document.createElement('div');
                    // Responsive sizing: slightly larger on mobile for easier touch aiming
                    el.className = 'target-item pointer-events-auto w-[16vw] sm:w-[8vw] max-w-[70px] sm:max-w-[80px] cursor-crosshair';
                    el.dataset.type = item;
                    el.innerHTML = getSVG(item);
                    itemsDiv.appendChild(el);
                });
                
                const shelf = document.createElement('div');
                shelf.className = 'w-full h-3 sm:h-5 bg-gradient-to-r from-amber-900 via-amber-600 to-amber-900 shadow-[0_10px_20px_rgba(0,0,0,0.6)] border-t-[3px] border-amber-400 rounded-sm mt-[-2px] z-0';
                
                rowDiv.appendChild(itemsDiv);
                rowDiv.appendChild(shelf);
                container.appendChild(rowDiv);
            });
        }
        initLevel();

        // Update Aim & Cannon Graphic
        function updateCannonAngle() {
            const cannon = document.getElementById('cannon-wrapper');
            const rect = cannon.getBoundingClientRect();
            
            // Pivot point is near the bottom center of the screen
            const cannonX = width / 2;
            const cannonY = height;
            
            const dx = aimX - cannonX;
            const dy = aimY - cannonY;
            
            let angle = Math.atan2(dy, dx);
            
            // Constrain angle to prevent pointing backwards/too low
            const maxRot = 70 * Math.PI / 180; // 70 degrees left/right
            let diff = angle - (-Math.PI/2);
            
            while(diff < -Math.PI) diff += Math.PI * 2;
            while(diff > Math.PI) diff -= Math.PI * 2;
            
            if (diff < -maxRot) angle = -Math.PI/2 - maxRot;
            if (diff > maxRot) angle = -Math.PI/2 + maxRot;
            
            cannonAngle = angle;
            
            // Convert to CSS degrees (-90 rad is 0 deg in our SVG setup)
            let cssRot = (angle + Math.PI/2) * (180/Math.PI);
            cannon.style.transform = `translateX(-50%) rotate(${cssRot}deg)`;
        }

        function updateCrosshair() {
            const ch = document.getElementById('crosshair');
            ch.style.left = `${aimX}px`;
            ch.style.top = `${aimY}px`;
            if (isShooting) ch.classList.add('scale-75');
            else ch.classList.remove('scale-75');
        }

        // Input Handling (Desktop)
        window.addEventListener('mousemove', (e) => {
            aimX = e.clientX;
            aimY = e.clientY;
            updateCannonAngle();
            updateCrosshair();
        });
        window.addEventListener('mousedown', (e) => {
            if(e.target.closest('#pauseMenu') || e.target.closest('#pauseBtn')) return;
            initAudio();
            isShooting = true;
            updateCrosshair();
        });
        window.addEventListener('mouseup', () => {
            isShooting = false;
            updateCrosshair();
        });

        // Input Handling (Mobile Touch)
        function handleTouchAim(touches) {
            if (isPaused) return;
            
            // Find a touch that is NOT on the shoot button (fixes multi-touch)
            for (let i = 0; i < touches.length; i++) {
                const touch = touches[i];
                // Ignore touches on UI buttons so we don't aim at them
                if (touch.target.closest('#mobileShootBtn') || touch.target.closest('.pointer-events-auto')) {
                    continue;
                }
                
                aimX = touch.clientX;
                // Increase Y offset on mobile so the finger doesn't block the target/crosshair
                aimY = touch.clientY - (window.innerWidth < 768 ? 70 : 0);
                updateCannonAngle();
                updateCrosshair();
                break; // Use the first valid aiming touch
            }
        }

        window.addEventListener('touchstart', (e) => {
            handleTouchAim(e.touches);
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if(isPaused) return;
            // Only prevent default (scrolling) if touching the game area, not UI
            if (!e.target.closest('#mobileShootBtn') && !e.target.closest('.pointer-events-auto')) {
                e.preventDefault();
            }
            handleTouchAim(e.touches);
        }, { passive: false });

        const mobileBtn = document.getElementById('mobileShootBtn');
        mobileBtn.addEventListener('touchstart', (e) => {
            initAudio();
            isShooting = true;
            updateCrosshair();
        });
        mobileBtn.addEventListener('touchend', (e) => {
            isShooting = false;
            updateCrosshair();
        });
        mobileBtn.addEventListener('touchcancel', () => {
            isShooting = false;
        });

        // Particle System for Splash
        class SplashParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.size = Math.random() * 6 + 4;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.4; // Gravity
                this.life -= 0.04;
            }
            draw(ctx) {
                ctx.fillStyle = `rgba(186, 230, 253, ${this.life})`; // Tailwind sky-200
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Logic & Render Loop
        function gameLoop() {
            ctx.clearRect(0, 0, width, height);

            // Target Movement Logic (Starts from Level 1)
            if (!isPaused) {
                const time = Date.now() / 1000;
                const rows = document.querySelectorAll('.target-row-items');
                rows.forEach((row, index) => {
                    // Start speed slightly slower for better mobile playability
                    const speed = 1.0 + (level * 0.15); 
                    // Alternate direction per shelf
                    const direction = index % 2 === 0 ? 1 : -1; 
                    // Max left/right distance (15% of shelf width)
                    const maxDist = 15; 
                    const offset = Math.sin(time * speed * direction) * maxDist;
                    
                    row.style.transform = `translateX(${offset}%)`;
                });
            }

            if (!isPaused && isShooting) {
                // Calculate cannon tip position
                const pivotX = width / 2;
                const pivotY = height;
                // Estimate cannon length based on screen
                const cannonLen = (window.innerWidth < 768 ? 160 : 220) * 0.85; 
                const tipX = pivotX + Math.cos(cannonAngle) * cannonLen;
                const tipY = pivotY + Math.sin(cannonAngle) * cannonLen;

                // Draw Water Stream (Bezier curve to add wobble)
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                let cpX = tipX + (aimX - tipX) * 0.5 + (Math.random() - 0.5) * 40;
                let cpY = tipY + (aimY - tipY) * 0.5 + (Math.random() - 0.5) * 40;
                ctx.quadraticCurveTo(cpX, cpY, aimX, aimY);
                
                // Stream Outer Glow
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.6)';
                ctx.lineWidth = 18 + Math.random() * 6;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // Stream Inner Core
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.lineWidth = 6 + Math.random() * 3;
                ctx.stroke();

                // Generate constant splash at aim point
                for(let i=0; i<3; i++) {
                    particles.push(new SplashParticle(aimX + (Math.random()-0.5)*15, aimY + (Math.random()-0.5)*15));
                }

                checkHits();
            }

            // Update & Draw Particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            requestAnimationFrame(gameLoop);
        }
        
        // Start loop
        requestAnimationFrame(gameLoop);

        // Hit Detection Logic
        function checkHits() {
            const now = Date.now();
            if (now - lastHitTime < 150) return; // Rate limit hits

            // Use elementFromPoint to find what's under the water stream
            // (Assumes Canvas and Crosshair have pointer-events: none)
            const elements = document.elementsFromPoint(aimX, aimY);
            for (let el of elements) {
                const target = el.closest('.target-item');
                if (target && !target.classList.contains('hit')) {
                    
                    target.classList.add('hit');
                    playHitSound();
                    
                    const type = target.dataset.type;
                    const pts = scoreValues[type] || 10;
                    
                    // Show floating points
                    const rect = target.getBoundingClientRect();
                    showFloatingScore(pts, rect.left + rect.width/2, rect.top);
                    
                    // Huge splash on impact
                    for(let i=0; i<20; i++) {
                        particles.push(new SplashParticle(rect.left + rect.width/2, rect.top + rect.height/2));
                    }
                    
                    updateScore(pts);
                    lastHitTime = now;
                    break; 
                }
            }
        }

        function showFloatingScore(pts, x, y) {
            const fl = document.createElement('div');
            fl.textContent = `+${pts}`;
            fl.className = 'fixed text-yellow-300 font-black text-3xl sm:text-4xl drop-shadow-[0_3px_3px_rgba(0,0,0,0.8)] pointer-events-none z-50 animate-float-up';
            fl.style.left = `${x - 20}px`;
            fl.style.top = `${y}px`;
            document.body.appendChild(fl);
            setTimeout(() => fl.remove(), 1000);
        }

        function updateScore(pts) {
            score += pts;
            coins += Math.floor(pts / 2);
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('coinsDisplay').textContent = coins;
            
            // Check win condition
            const remaining = document.querySelectorAll('.target-item:not(.hit)');
            if (remaining.length === 0) {
                setTimeout(() => {
                    level++;
                    document.getElementById('levelDisplay').textContent = `LEVEL ${level.toString().padStart(2, '0')}`;
                    initLevel();
                }, 1500);
            }
        }

        // Pause Menu Logic
        const pauseMenu = document.getElementById('pauseMenu');
        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPaused = true;
            isShooting = false;
            pauseMenu.classList.remove('hidden');
            pauseMenu.classList.add('flex');
        });
        document.getElementById('resumeBtn').addEventListener('click', () => {
            isPaused = false;
            pauseMenu.classList.add('hidden');
            pauseMenu.classList.remove('flex');
        });
        document.getElementById('restartBtn').addEventListener('click', () => {
            isPaused = false;
            pauseMenu.classList.add('hidden');
            pauseMenu.classList.remove('flex');
            initLevel();
            score = Math.max(0, score - 50); // Small penalty for restart
            document.getElementById('scoreDisplay').textContent = score;
        });

    </script>
    <!-- Fullscreen Launcher -->
<div id="fullscreen-start" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
">
    <button onclick="startFullscreen()" style="
    padding:20px 40px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#4ade80;
    color:#000;
    ">
        PLAY FULLSCREEN
    </button>
</div>

<script>
function startFullscreen() {
    const elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }

    document.getElementById("fullscreen-start").style.display = "none";
}

document.addEventListener("fullscreenchange", () => {
    const overlay = document.getElementById("fullscreen-start");

    if (!document.fullscreenElement) {
        overlay.style.display = "flex";
    } else {
        overlay.style.display = "none";
    }
});
</script>
</body>
</html>
