<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Water Shooting Fun Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Prevent scrolling on mobile */
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #7dd3fc;
        }

        /* Target Animations */
        .target-item {
            transition: transform 0.23s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            transform-origin: bottom center;
        }
        .target-item.hit {
            transform: rotateX(85deg) translateY(-15px) scale(0.7) !important;
            opacity: 0;
            pointer-events: none;
        }

        /* Floating Score Animation */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.9); opacity: 1; }
            100% { transform: translateY(-70px) scale(1.3); opacity: 0; }
        }
        .animate-float-up {
            animation: floatUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Water Pool Reflection Animation */
        @keyframes wave {
            0% { transform: translateX(-5%); }
            50% { transform: translateX(-15%); }
            100% { transform: translateX(-5%); }
        }
        .animate-wave { animation: wave 8s ease-in-out infinite; }
        .animate-wave-slow { animation: wave 14s ease-in-out infinite reverse; }

        /* Gentle floating animation for the horizon ball */
        @keyframes bobbing {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(3px) rotate(15deg); }
        }
        .bobbing-ball {
            animation: bobbing 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="relative w-full h-screen bg-gradient-to-b from-sky-200 via-sky-300 to-sky-100 overflow-hidden">

    <!-- Scenery: Background Elements -->
    <div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
        <!-- Sun: Clean, high right-side sun -->
        <div class="absolute top-6 right-6 w-16 h-16 bg-yellow-100 rounded-full blur-md opacity-80"></div>
        
        <!-- Clean downward-pointing triangles matching the image's top indicators -->
        <div class="absolute top-0 w-full px-12 flex justify-between opacity-90 z-10">
            <div class="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[20px] border-t-red-500"></div>
            <div class="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[20px] border-t-blue-500 ml-[-15%]"></div>
            <div class="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[20px] border-t-yellow-500"></div>
            <div class="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[20px] border-t-green-600 mr-[-15%]"></div>
            <div class="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[20px] border-t-orange-500"></div>
        </div>

        <!-- Precise Horizon Line & Shore Trees matching image_4a5d78.png -->
        <div class="absolute bottom-[40vh] w-full h-[2px] bg-cyan-300 opacity-60 z-10"></div>
        
        <!-- Shoreline Emojis/Assets scaled & positioned precisely on the water line -->
        <div class="absolute bottom-[40vh] w-full flex justify-between px-2 sm:px-6 items-end z-10 translation-y-[50%]">
            <!-- Left Shore Palm Tree -->
            <div class="text-3xl sm:text-4xl drop-shadow-md origin-bottom translate-y-[12px]">🌴</div>
            
            <!-- Center Floating Beachball -->
            <div class="bobbing-ball text-2xl drop-shadow-sm translate-y-[10px] bg-white rounded-full p-0.5 border border-slate-400/50 flex items-center justify-center">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" fill="#f87171"/>
                    <path d="M12 2C7.5 4.5 5.5 8 5.5 12s2 7.5 6.5 10c4.5-2.5 6.5-6 6.5-10S16.5 4.5 12 2z" fill="#facc15"/>
                    <path d="M12 2C9.5 4.5 8.5 8 8.5 12s1 7.5 3.5 10c2.5-2.5 3.5-6 3.5-10S14.5 4.5 12 2z" fill="#3b82f6"/>
                    <circle cx="12" cy="12" r="3" fill="#ffffff"/>
                </svg>
            </div>

            <!-- Right Shore Palm Tree -->
            <div class="text-3xl sm:text-4xl drop-shadow-md origin-bottom translate-y-[12px] transform scale-x-[-1]">🌴</div>
        </div>
    </div>

    <!-- Scenery: Water Pool Foreground (Occupies bottom 40% of screen to fit perspective) -->
    <div class="absolute bottom-0 w-full h-[40vh] bg-gradient-to-b from-cyan-400 via-cyan-500 to-blue-700 border-t-2 border-cyan-300 shadow-[inset_0_15px_30px_rgba(255,255,255,0.3)] z-10 overflow-hidden">
        <div class="w-[200%] h-5 bg-white opacity-20 mt-3 animate-wave rounded-full blur-md"></div>
        <div class="w-[150%] h-4 bg-white opacity-10 mt-7 animate-wave-slow rounded-full blur-sm ml-[-20%]"></div>
        <div class="w-[180%] h-3 bg-white opacity-15 mt-11 animate-wave rounded-full blur-sm ml-[-10%]"></div>
    </div>

    <!-- Wooden Platform for Cannon matching image_4a5d78.png bottom edge -->
    <div class="absolute bottom-0 w-full h-8 bg-amber-950 border-t-4 border-amber-800 z-10 shadow-[0_-3px_15px_rgba(0,0,0,0.5)] flex justify-center overflow-hidden">
        <div class="w-full h-full opacity-20 flex gap-4">
            <div class="w-1/6 h-full border-r border-black"></div>
            <div class="w-1/6 h-full border-r border-black"></div>
            <div class="w-1/6 h-full border-r border-black"></div>
            <div class="w-1/6 h-full border-r border-black"></div>
            <div class="w-1/6 h-full border-r border-black"></div>
        </div>
    </div>

    <!-- Gameplay Area: Compact, centered shelves to create the "far away" look -->
    <div id="shelves" class="absolute top-[10vh] left-1/2 -translate-x-1/2 w-[60%] sm:w-[40%] max-w-sm h-[48vh] flex flex-col justify-between items-center z-20 pointer-events-none">
        <!-- Generated dynamically via JS -->
    </div>

    <!-- Overlay Canvas for Water Stream & Splash Particles -->
    <canvas id="waterCanvas" class="absolute inset-0 z-30 pointer-events-none"></canvas>

    <!-- Cannon Graphics (Small and centered perfectly at the bottom) -->
    <div id="cannon-wrapper" class="absolute bottom-[-5px] left-1/2 w-20 sm:w-24 h-32 sm:h-36 -translate-x-1/2 origin-[50%_100%] z-40 pointer-events-none drop-shadow-xl">
        <svg viewBox="0 0 100 150" class="w-full h-full">
            <!-- Back handle -->
            <path d="M 25 150 L 35 110 L 65 110 L 75 150 Z" fill="#C2410C"/>
            <!-- Main orange barrel base -->
            <path d="M 15 110 L 25 50 L 75 50 L 85 110 Z" fill="#EA580C"/>
            <!-- Blue middle block -->
            <rect x="30" y="30" width="40" height="40" rx="5" fill="#2563EB"/>
            <!-- Cyan ribbed sections -->
            <rect x="25" y="60" width="50" height="8" fill="#38BDF8"/>
            <rect x="27" y="75" width="46" height="8" fill="#38BDF8"/>
            <rect x="29" y="90" width="42" height="8" fill="#38BDF8"/>
            <!-- Barrel tip -->
            <path d="M 35 30 L 42 0 L 58 0 L 65 30 Z" fill="#0284C7"/>
            <!-- Cannon core hole -->
            <ellipse cx="50" cy="5" rx="10" ry="4" fill="#0F172A"/>
            <!-- Details / Highlights -->
            <path d="M 42 0 L 46 30" stroke="#7DD3FC" stroke-width="2" fill="none"/>
            <circle cx="50" cy="115" r="12" fill="#1E3A8A"/>
            <circle cx="50" cy="115" r="6" fill="#60A5FA"/>
        </svg>
    </div>

    <!-- Visual Crosshair -->
    <div id="crosshair" class="fixed w-8 h-8 pointer-events-none z-50 transform -translate-x-1/2 -translate-y-1/2 transition-transform duration-100 ease-out hidden sm:block drop-shadow-md">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.8)" stroke-width="6" fill="none" stroke-dasharray="16 16"/>
            <circle cx="50" cy="50" r="6" fill="#EF4444"/>
            <line x1="50" y1="0" x2="50" y2="20" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round"/>
            <line x1="50" y1="100" x2="50" y2="80" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round"/>
            <line x1="0" y1="50" x2="20" y2="50" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round"/>
            <line x1="100" y1="50" x2="80" y2="50" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- UI: Top Bar -->
    <div class="absolute top-3 left-0 w-full px-4 flex justify-between items-center text-white font-black font-sans text-xs sm:text-base z-50 pointer-events-none">
        
        <!-- Level Panel (Pill design) -->
        <div class="bg-blue-600/95 px-3 py-1 sm:px-4 sm:py-1.5 rounded-full border border-blue-300 shadow-[0_2px_10px_rgba(59,130,246,0.4)] pointer-events-auto">
            <span id="levelDisplay">LEVEL 01</span>
        </div>
        
        <!-- Score Panel (Pill design) -->
        <div class="bg-slate-900/90 px-4 py-1 sm:px-6 sm:py-1.5 rounded-full border border-slate-600 shadow-md pointer-events-auto">
            SCORE <span id="scoreDisplay" class="text-sky-300 ml-1">0</span>
        </div>
        
        <!-- Coins Panel (Pill design) -->
        <div class="bg-amber-500/95 px-3 py-1 sm:px-4 sm:py-1.5 rounded-full border border-amber-200 text-amber-950 flex items-center gap-1 shadow-md pointer-events-auto">
            <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 bg-yellow-300 rounded-full border border-yellow-700 shadow-inner"></div>
            <span id="coinsDisplay">0</span>
        </div>
        
        <!-- Pause Button (Minimal round icon) -->
        <button id="pauseBtn" class="bg-blue-500 hover:bg-blue-400 active:bg-blue-600 w-8 h-8 sm:w-10 sm:h-10 rounded-full flex justify-center items-center border border-blue-200 shadow-md pointer-events-auto transition-transform active:scale-90">
            <svg class="w-3 h-3 sm:w-4 sm:h-4 fill-white" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
    </div>

    <!-- Mobile Shoot Button (Optimized touch alternative) -->
    <button id="mobileShootBtn" class="fixed bottom-4 right-4 w-16 h-16 bg-blue-500/90 rounded-full border-2 border-blue-200 shadow-lg md:hidden z-50 active:bg-blue-600 flex flex-col items-center justify-center text-white font-black text-xs select-none touch-manipulation">
        <svg class="w-6 h-6 fill-white" viewBox="0 0 24 24">
            <path d="M12 2c0 0-4.5 6.5-4.5 10.5 0 2.5 2 4.5 4.5 4.5s4.5-2 4.5-4.5C16.5 8.5 12 2 12 2zm0 13c-1.4 0-2.5-1.1-2.5-2.5 0-1.7 2.5-4.8 2.5-4.8s2.5 3.1 2.5 4.8c0 1.4-1.1 2.5-2.5 2.5z"/>
        </svg>
        SHOOT
    </button>

    <!-- Pause / Restart Menu -->
    <div id="pauseMenu" class="fixed inset-0 bg-black/60 z-[100] hidden flex-col items-center justify-center backdrop-blur-sm">
        <div class="bg-sky-50 p-6 rounded-[1.5rem] border-2 border-blue-400 shadow-2xl text-center max-w-xs w-[85%]">
            <h2 class="text-3xl font-black text-blue-600 mb-4 tracking-wider">PAUSED</h2>
            <button id="resumeBtn" class="w-full bg-green-500 hover:bg-green-400 text-white font-bold text-lg py-3 rounded-xl mb-3 border-b-4 border-green-700 active:border-b-0 active:translate-y-0.5 transition-all shadow-sm">RESUME</button>
            <button id="restartBtn" class="w-full bg-red-500 hover:bg-red-400 text-white font-bold text-lg py-3 rounded-xl border-b-4 border-red-700 active:border-b-0 active:translate-y-0.5 transition-all shadow-md">RESTART</button>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Game State
        let level = 1;
        let score = 0;
        let coins = 0;
        
        let aimX = window.innerWidth / 2;
        let aimY = window.innerHeight / 2;
        let isShooting = false;
        let cannonAngle = -Math.PI / 2;
        let isPaused = false;
        
        let lastHitTime = 0;
        let particles = [];

        // Canvas Setup
        const canvas = document.getElementById('waterCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            width = canvas.width;
            height = canvas.height;
            aimX = width / 2;
            aimY = height / 2;
            updateCannonAngle();
            updateCrosshair();
        }
        window.addEventListener('resize', resize);
        resize();

        // Audio synthesizer node setup
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playHitSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(700, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.12);
            
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        // Layout Configuration (3 rows matching the high stacked shelves in the image)
        const layoutConfig = [
            ['duck', 'target', 'red'],
            ['green', 'blue', 'red', 'target', 'green', 'yellow'],
            ['target', 'blue', 'duck', 'green']
        ];
        
        const scoreValues = { 'duck': 15, 'target': 20, 'red': 10, 'blue': 10, 'green': 10, 'yellow': 10 };

        // Asset Generation (Inline SVGs, designed compact and neat)
        function getSVG(type) {
            if (type === 'duck') {
                return `<svg viewBox="0 0 100 100" class="w-full h-full"><ellipse cx="50" cy="70" rx="35" ry="22" fill="#FACC15"/><circle cx="70" cy="40" r="22" fill="#FACC15"/><circle cx="78" cy="35" r="4" fill="#000"/><path d="M 88 42 Q 105 42 98 52 Q 88 55 85 45 Z" fill="#F97316"/><path d="M 30 65 Q 15 60 10 70 Q 25 75 30 65" fill="#EAB308"/></svg>`;
            } else if (type === 'target') {
                return `<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="45" fill="#F8FAFC" stroke="#1E293B" stroke-width="4"/><circle cx="50" cy="50" r="32" fill="#EF4444"/><circle cx="50" cy="50" r="18" fill="#F8FAFC"/><circle cx="50" cy="50" r="8" fill="#EF4444"/></svg>`;
            } else {
                let color;
                if(type === 'red') color = '#EF4444';
                if(type === 'blue') color = '#3B82F6';
                if(type === 'green') color = '#10B981';
                if(type === 'yellow') color = '#F59E0B';
                
                return `<svg viewBox="0 0 50 120" class="w-full h-full">
                    <path d="M 15 40 C 15 25 20 20 20 15 L 20 10 L 30 10 L 30 15 C 30 20 35 25 35 40 L 40 110 C 40 115 35 118 25 118 C 15 118 10 115 10 110 Z" fill="${color}"/>
                    <rect x="18" y="5" width="14" height="6" rx="2" fill="#9CA3AF"/>
                    <path d="M 14 45 Q 18 80 14 105" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.4"/>
                    <ellipse cx="25" cy="65" rx="10" ry="10" fill="#ffffff" opacity="0.2"/>
                </svg>`;
            }
        }

        // Initialize Level with miniature items to represent great distance
        function initLevel() {
            const container = document.getElementById('shelves');
            container.innerHTML = '';
            
            layoutConfig.forEach((row, index) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'w-full flex flex-col items-center justify-end relative my-1';
                
                const itemsDiv = document.createElement('div');
                itemsDiv.className = 'target-row-items flex justify-around items-end w-[90%] z-10 min-h-[35px]';
                
                row.forEach(item => {
                    const el = document.createElement('div');
                    // Mini targets for the "far away" depth effect
                    el.className = 'target-item pointer-events-auto w-[4.5vw] sm:w-[2.2vw] max-w-[18px] sm:max-w-[22px] cursor-crosshair mx-0.5';
                    el.dataset.type = item;
                    el.innerHTML = getSVG(item);
                    itemsDiv.appendChild(el);
                });
                
                // Very thin wooden shelf
                const shelf = document.createElement('div');
                shelf.className = 'w-full h-1.5 bg-gradient-to-r from-amber-800 via-amber-600 to-amber-800 shadow-[0_3px_6px_rgba(0,0,0,0.5)] border-t border-amber-300 rounded-sm mt-[-1px] z-0';
                
                rowDiv.appendChild(itemsDiv);
                rowDiv.appendChild(shelf);
                container.appendChild(rowDiv);
            });
        }
        initLevel();

        // Update Aim & Cannon Graphic
        function updateCannonAngle() {
            const cannon = document.getElementById('cannon-wrapper');
            const cannonX = width / 2;
            const cannonY = height;
            
            const dx = aimX - cannonX;
            const dy = aimY - cannonY;
            
            let angle = Math.atan2(dy, dx);
            
            // Limit angles so cannon doesn't flip completely backwards
            const maxRot = 75 * Math.PI / 180;
            let diff = angle - (-Math.PI/2);
            
            while(diff < -Math.PI) diff += Math.PI * 2;
            while(diff > Math.PI) diff -= Math.PI * 2;
            
            if (diff < -maxRot) angle = -Math.PI/2 - maxRot;
            if (diff > maxRot) angle = -Math.PI/2 + maxRot;
            
            cannonAngle = angle;
            
            let cssRot = (angle + Math.PI/2) * (180/Math.PI);
            cannon.style.transform = `translateX(-50%) rotate(${cssRot}deg)`;
        }

        function updateCrosshair() {
            const ch = document.getElementById('crosshair');
            ch.style.left = `${aimX}px`;
            ch.style.top = `${aimY}px`;
            if (isShooting) ch.classList.add('scale-75');
            else ch.classList.remove('scale-75');
        }

        // Input Handling
        window.addEventListener('mousemove', (e) => {
            aimX = e.clientX;
            aimY = e.clientY;
            updateCannonAngle();
            updateCrosshair();
        });
        window.addEventListener('mousedown', (e) => {
            if(e.target.closest('#pauseMenu') || e.target.closest('#pauseBtn')) return;
            initAudio();
            isShooting = true;
            updateCrosshair();
        });
        window.addEventListener('mouseup', () => {
            isShooting = false;
            updateCrosshair();
        });

        // Input Handling (Mobile Touch)
        window.addEventListener('touchmove', (e) => {
            if(isPaused) return;
            e.preventDefault();
            aimX = e.touches[0].clientX;
            aimY = e.touches[0].clientY - (window.innerWidth < 768 ? 35 : 0);
            updateCannonAngle();
            updateCrosshair();
        }, { passive: false });

        const mobileBtn = document.getElementById('mobileShootBtn');
        mobileBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
            isShooting = true;
            updateCrosshair();
        });
        mobileBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            isShooting = false;
            updateCrosshair();
        });

        // Particle System for Water Splash
        class SplashParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.35; // Gravity pull
                this.life -= 0.05;
            }
            draw(ctx) {
                ctx.fillStyle = `rgba(224, 242, 254, ${this.life})`; // Soft icy water droplet
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Main Loop
        function gameLoop() {
            ctx.clearRect(0, 0, width, height);

            // Target Movement Logic (Slightly slower movement to make the targets easier to aim at from a distance)
            if (!isPaused && level > 1) {
                const time = Date.now() / 1000;
                const rows = document.querySelectorAll('.target-row-items');
                rows.forEach((row, index) => {
                    const speed = 1.0 + (level * 0.1); 
                    const direction = index % 2 === 0 ? 1 : -1; 
                    const maxDist = 12; // narrow boundaries to fit inside the centered shelf
                    const offset = Math.sin(time * speed * direction) * maxDist;
                    row.style.transform = `translateX(${offset}%)`;
                });
            }

            if (!isPaused && isShooting) {
                // Calculate precise cannon nozzle tip position
                const pivotX = width / 2;
                const pivotY = height;
                const cannonLen = (window.innerWidth < 768 ? 110 : 140); 
                const tipX = pivotX + Math.cos(cannonAngle) * cannonLen;
                const tipY = pivotY + Math.sin(cannonAngle) * cannonLen;

                // Draw curving Water Stream
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                let cpX = tipX + (aimX - tipX) * 0.5 + (Math.random() - 0.5) * 30;
                let cpY = tipY + (aimY - tipY) * 0.5 + (Math.random() - 0.5) * 30;
                ctx.quadraticCurveTo(cpX, cpY, aimX, aimY);
                
                // Stream Outer Glow
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.5)';
                ctx.lineWidth = 12 + Math.random() * 4;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // Stream Core
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.lineWidth = 4 + Math.random() * 2;
                ctx.stroke();

                // Constant splashes
                for(let i=0; i<2; i++) {
                    particles.push(new SplashParticle(aimX + (Math.random()-0.5)*10, aimY + (Math.random()-0.5)*10));
                }

                checkHits();
            }

            // Update & Draw Particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            requestAnimationFrame(gameLoop);
        }
        
        requestAnimationFrame(gameLoop);

        // Hit Detection Logic
        function checkHits() {
            const now = Date.now();
            if (now - lastHitTime < 130) return; // Rate limiting hits

            const elements = document.elementsFromPoint(aimX, aimY);
            for (let el of elements) {
                const target = el.closest('.target-item');
                if (target && !target.classList.contains('hit')) {
                    
                    target.classList.add('hit');
                    playHitSound();
                    
                    const type = target.dataset.type;
                    const pts = scoreValues[type] || 10;
                    
                    // Show floating points
                    const rect = target.getBoundingClientRect();
                    showFloatingScore(pts, rect.left + rect.width/2, rect.top);
                    
                    // Tiny splash sparks
                    for(let i=0; i<12; i++) {
                        particles.push(new SplashParticle(rect.left + rect.width/2, rect.top + rect.height/2));
                    }
                    
                    updateScore(pts);
                    lastHitTime = now;
                    break; 
                }
            }
        }

        function showFloatingScore(pts, x, y) {
            const fl = document.createElement('div');
            fl.textContent = `+${pts}`;
            fl.className = 'fixed text-yellow-300 font-black text-xl sm:text-2xl drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] pointer-events-none z-50 animate-float-up';
            fl.style.left = `${x - 10}px`;
            fl.style.top = `${y}px`;
            document.body.appendChild(fl);
            setTimeout(() => fl.remove(), 1200);
        }

        function updateScore(pts) {
            score += pts;
            coins += Math.floor(pts / 2);
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('coinsDisplay').textContent = coins;
            
            // Check win condition
            const remaining = document.querySelectorAll('.target-item:not(.hit)');
            if (remaining.length === 0) {
                setTimeout(() => {
                    level++;
                    document.getElementById('levelDisplay').textContent = `LEVEL ${level.toString().padStart(2, '0')}`;
                    initLevel();
                }, 1200);
            }
        }

        // Pause Menu Logic
        const pauseMenu = document.getElementById('pauseMenu');
        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPaused = true;
            isShooting = false;
            pauseMenu.classList.remove('hidden');
            pauseMenu.classList.add('flex');
        });
        document.getElementById('resumeBtn').addEventListener('click', () => {
            isPaused = false;
            pauseMenu.classList.add('hidden');
            pauseMenu.classList.remove('flex');
        });
        document.getElementById('restartBtn').addEventListener('click', () => {
            isPaused = false;
            pauseMenu.classList.add('hidden');
            pauseMenu.classList.remove('flex');
            initLevel();
            score = Math.max(0, score - 30); // Minimal penalty for restart
            document.getElementById('scoreDisplay').textContent = score;
        });

    </script>
  <!-- Fullscreen Launcher -->
<div id="fullscreen-start" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
">
    <button onclick="startFullscreen()" style="
    padding:20px 40px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#4ade80;
    color:#000;
    ">
        PLAY FULLSCREEN
    </button>
</div>

<script>
function startFullscreen() {
    const elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }

    document.getElementById("fullscreen-start").style.display = "none";
}

document.addEventListener("fullscreenchange", () => {
    const overlay = document.getElementById("fullscreen-start");

    if (!document.fullscreenElement) {
        overlay.style.display = "flex";
    } else {
        overlay.style.display = "none";
    }
});
</script>
</body>
